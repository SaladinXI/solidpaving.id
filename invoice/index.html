<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice · SolidPaving.id</title>
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<meta name="bingbot" content="noindex, nofollow">
<style>
:root{
  --blue:#2E3E5F;--blue2:#3D5280;--accent:#95B3D9;
  --bg0:#fff;--bg1:#F4F7FB;--bg2:#EBF1F8;
  --tx1:#0D1A2E;--tx2:#2D4466;--tx3:#6A80A0;
  --bdr:rgba(46,62,95,.15);--bds:rgba(13,26,46,.07);
  --green:#0F6E56;--red:#b41e1e;--r:5px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#e8edf3;color:var(--tx1);font-size:13px;line-height:1.5;}
.app{display:grid;grid-template-columns:390px 1fr;min-height:100vh;}

.fp{background:var(--bg1);padding:16px;overflow-y:auto;border-right:1px solid var(--bdr);position:sticky;top:0;height:100vh;}
.fp h2{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--accent);letter-spacing:.5px;}
.sec{margin-bottom:14px;}
.sec-t{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bds);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.f{margin-bottom:6px;}
label{display:block;font-size:10px;color:var(--tx3);margin-bottom:2px;}
input,select,textarea{width:100%;padding:5px 8px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:inherit;color:var(--tx1);background:var(--bg0);outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(149,179,217,.15);}
textarea{resize:vertical;}
.inv-no-row{display:flex;gap:5px;align-items:flex-end;}
.inv-no-row input{flex:1;}
.btn-gen{padding:5px 9px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);font-size:10px;color:var(--blue2);cursor:pointer;white-space:nowrap;}
.btn-gen:hover{background:var(--accent);color:#fff;}

.ih{display:grid;grid-template-columns:1fr 50px 70px 88px 24px;gap:4px;margin-bottom:3px;}
.ih span{font-size:9px;color:var(--tx3);}
.ir{display:grid;grid-template-columns:1fr 50px 70px 88px 24px;gap:4px;align-items:start;margin-bottom:4px;}
.ir input,.ir select{font-size:11px;padding:4px 6px;}
.bd{width:24px;height:28px;background:none;border:1px solid rgba(180,30,30,.2);border-radius:var(--r);color:var(--red);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:.7;}
.bd:hover{opacity:1;background:rgba(180,30,30,.06);}
.ba{background:none;border:1px dashed var(--bdr);color:var(--tx3);padding:4px 8px;border-radius:var(--r);cursor:pointer;font-size:11px;width:100%;margin-top:2px;transition:all .15s;}
.ba:hover{border-color:var(--accent);color:var(--blue2);}

.pay-summary{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px;margin-bottom:6px;font-size:11px;}
.pay-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--tx3);}
.pay-row.em{color:var(--tx1);border-top:1px solid var(--bdr);margin-top:3px;padding-top:4px;}
.pay-row.red{color:var(--red);}
.pay-row.green{color:var(--green);}
.btn-print{width:100%;background:var(--blue);color:#fff;border:none;padding:9px;border-radius:var(--r);font-size:12px;cursor:pointer;margin-top:4px;letter-spacing:.3px;}
.btn-print:hover{background:var(--blue2);}

.pp{background:#c8d3e0;padding:24px;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;}

.a4{background:#fff;width:210mm;min-height:297mm;padding:13mm 14mm 11mm;font-family:'Segoe UI',system-ui,sans-serif;color:#111827;line-height:1.55;box-shadow:0 4px 32px rgba(0,0,0,.15);}

.a4-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6mm;padding-bottom:5mm;border-bottom:1.5px solid #2E3E5F;}
.logo-main{font-size:17pt;letter-spacing:2px;line-height:1;}
.logo-main .s1{color:#2E3E5F;font-weight:700;}
.logo-main .s2{color:#6A9CC8;font-weight:300;}
.tagline{font-size:6.5pt;color:#6A80A0;letter-spacing:1px;margin-top:3px;}
.from-contact{font-size:7pt;color:#6A80A0;margin-top:5px;line-height:1.8;}
.inv-info-block{text-align:right;}
.inv-label{font-size:6.5pt;color:#6A80A0;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.inv-number{font-size:13pt;color:#1a2a40;font-weight:600;letter-spacing:.5px;line-height:1.2;}
.status-badge{display:inline-block;padding:2px 9px;border-radius:3px;font-size:6.5pt;letter-spacing:.5px;margin-top:4px;font-weight:600;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.meta-box{background:#F2F5FA;border-radius:3px;padding:5px 8px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.ml{font-size:6.5pt;color:#6A80A0;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px;}
.mv{font-size:8.5pt;color:#111827;}
.mv-due{color:#991B1B;font-weight:600;}
.mv2{font-size:7pt;color:#6A80A0;margin-top:1px;}

.client-row{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.client-box{background:#F2F5FA;border-radius:3px;padding:7px 9px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.box-lbl{font-size:6.5pt;color:#6A80A0;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.client-name{font-size:9.5pt;color:#111827;font-weight:600;margin-bottom:3px;}
.client-detail{font-size:7.5pt;color:#374151;line-height:1.75;}
.from-box{background:#2E3E5F;border-radius:3px;padding:7px 9px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.from-box .box-lbl{color:rgba(255,255,255,.5);}
.from-box .client-name{color:#fff;font-weight:500;}
.from-box .client-detail{color:rgba(255,255,255,.75);}

table.it{width:100%;border-collapse:collapse;margin-bottom:5mm;font-size:8pt;}
table.it thead tr{background:#2E3E5F;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
table.it thead th{color:#fff;padding:5px 7px;font-size:6.5pt;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
table.it thead th:not(:first-child){text-align:right;}
table.it tbody tr{border-bottom:1px solid #E5EAF2;}
table.it tbody tr:nth-child(even){background:#F8FAFC;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
table.it tbody td{padding:5px 7px;color:#111827;}
table.it tbody td:not(:first-child){text-align:right;color:#374151;}
table.it tbody td.td-unit{text-align:center;color:#6A80A0;font-size:7.5pt;}

.pay-block{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.pay-table{font-size:8pt;width:100%;border-top:1px solid #E5EAF2;padding-top:3mm;}
.pay-table tr td{padding:2.5px 0;color:#374151;}
.pay-table tr td:last-child{text-align:right;}
.pt-disc td{color:#991B1B;}
.pt-gross td{color:#111827;border-top:1px solid #C8D3E0;padding-top:5px;font-weight:600;}
.pt-termin td{color:#1E3A5F;font-weight:600;}
.pt-paid td{color:#065F46;}
.pt-sisa td{color:#991B1B;font-weight:600;}

.right-pay{display:flex;flex-direction:column;gap:3mm;}
.termin-box{background:#2E3E5F;border-radius:3px;padding:8px 10px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.tb-lbl{font-size:6.5pt;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.tb-pct{font-size:16pt;color:#95B3D9;font-weight:300;line-height:1;}
.tb-amt{font-size:9pt;color:#fff;font-weight:500;margin-top:3px;}
.tb-badge{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:3px;font-size:6.5pt;font-weight:600;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.sisa-box{border:1.5px solid #FECACA;border-radius:3px;padding:8px 10px;text-align:center;background:#FEF2F2;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.sisa-box .tb-lbl{color:#991B1B;opacity:.7;}
.sisa-box .tb-amt{font-size:9.5pt;color:#991B1B;font-weight:600;}
.sisa-box.lunas{background:#F0FDF4;border-color:#86EFAC;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.sisa-box.lunas .tb-lbl{color:#065F46;opacity:.7;}
.sisa-box.lunas .tb-amt{color:#065F46;}

.note-guar{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.note-box{border-left:2.5px solid #95B3D9;padding:6px 9px;background:#F5F8FC;border-radius:0 3px 3px 0;font-size:7.5pt;color:#374151;line-height:1.6;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.guar-box{border-left:2.5px solid #059669;padding:6px 9px;background:#F0FDF4;border-radius:0 3px 3px 0;font-size:7.5pt;color:#065F46;line-height:1.6;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.nlbl{font-size:6.5pt;color:#6A80A0;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}

.bank-sig{display:grid;grid-template-columns:1fr 1fr;gap:3mm;margin-bottom:5mm;}
.bank-box{background:#F2F5FA;border-radius:3px;padding:7px 9px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.bank-name{font-size:7.5pt;color:#1E3A5F;font-weight:600;margin-bottom:3px;}
.bank-detail{font-size:7.5pt;color:#374151;line-height:1.7;}
.sig-box{text-align:center;padding-top:2mm;}
.sig-space{height:36px;border-bottom:1px solid #C8D3E0;margin-bottom:4px;}
.sig-lbl{font-size:7pt;color:#6A80A0;}
.sig-name{font-size:8pt;color:#111827;margin-top:2px;}

.a4-foot{border-top:1px solid #E5EAF2;padding-top:3mm;text-align:center;font-size:7pt;color:#6A80A0;line-height:1.8;}
.a4-foot span{color:#374151;}

@media print{
  .fp{display:none!important;}
  body{background:#fff;}
  .pp{padding:0;background:#fff;display:block;}
  .a4{box-shadow:none;margin:0;width:100%;min-height:auto;}
  @page{size:A4 portrait;margin:0;}
}
@media(max-width:960px){
  .app{grid-template-columns:1fr;}
  .fp{position:static;height:auto;}
  .pp{padding:12px;}
  .a4{width:100%;min-height:auto;padding:8mm;}
}
</style>
</head>
<body>
<div class="app">

<div class="fp">
  <h2>Invoice · SolidPaving.id</h2>

  <div class="sec">
    <div class="sec-t">Info Invoice</div>
    <div class="f">
      <label>No. Invoice</label>
      <div class="inv-no-row">
        <input id="fNo" value="INV-2026-001" oninput="render()">
        <button class="btn-gen" onclick="genNo()">&#8635; Auto</button>
      </div>
    </div>
    <div class="f"><label>Status Pembayaran</label>
      <select id="fStatus" onchange="statusChange()">
        <option value="PROFORMA:0">Proforma</option>
        <option value="TERMIN1:30">Termin I — DP 30%</option>
        <option value="TERMIN2:40">Termin II — Progress 40%</option>
        <option value="TERMIN3:25">Termin III — Progress 25%</option>
        <option value="TERMIN4:5">Termin IV — Pelunasan 5%</option>
        <option value="LUNAS:100">Lunas — 100%</option>
        <option value="TAGIHAN:100">Tagihan Penuh</option>
        <option value="CUSTOM:0">Persentase Kustom...</option>
      </select>
    </div>
    <div class="f" id="cPctWrap" style="display:none">
      <label>Persentase (%)</label>
      <input id="fCPct" type="number" min="1" max="100" value="30" oninput="render()">
    </div>
    <div class="r2">
      <div class="f"><label>Tgl. Invoice</label><input id="fDate" type="date" oninput="render()"></div>
      <div class="f"><label>Jatuh Tempo</label><input id="fDue" type="date" oninput="render()"></div>
    </div>
    <div class="f"><label>Tgl. Penagihan Berikutnya (opsional)</label><input id="fNext" type="date" oninput="render()"></div>
  </div>

  <div class="sec">
    <div class="sec-t">Data Klien</div>
    <div class="f"><label>Nama / Perusahaan</label><input id="cName" placeholder="PT. Contoh / Bpk. Ahmad" oninput="render()"></div>
    <div class="r2">
      <div class="f"><label>Telepon / WA</label><input id="cPhone" placeholder="0812-xxxx-xxxx" oninput="render()"></div>
      <div class="f"><label>Email (opsional)</label><input id="cEmail" placeholder="email@..." oninput="render()"></div>
    </div>
    <div class="f"><label>Alamat Klien</label><textarea id="cAddr" rows="2" placeholder="Jl. ..." oninput="render()"></textarea></div>
    <div class="f"><label>Lokasi Proyek</label><textarea id="cProj" rows="2" placeholder="Lokasi pemasangan..." oninput="render()"></textarea></div>
  </div>

  <div class="sec">
    <div class="sec-t">Item &amp; Layanan</div>
    <div class="ih"><span>Deskripsi</span><span>Qty</span><span>Sat.</span><span>Harga/Sat (Rp)</span><span></span></div>
    <div id="iWrap"></div>
    <button class="ba" onclick="addItem()">+ tambah item</button>
  </div>

  <div class="sec">
    <div class="sec-t">Diskon &amp; Pajak</div>
    <div class="r2">
      <div class="f"><label>Diskon (Rp)</label><input id="fDisc" type="number" min="0" value="0" oninput="render()"></div>
      <div class="f"><label>PPN</label>
        <select id="fPpn" onchange="render()">
          <option value="0">Tanpa PPN</option>
          <option value="11">PPN 11%</option>
          <option value="12">PPN 12%</option>
        </select>
      </div>
    </div>
    <div class="f"><label>Sudah Terbayar (Rp)</label><input id="fPaid" type="number" min="0" value="0" oninput="render()"></div>
  </div>

  <div class="sec">
    <div class="sec-t">Catatan &amp; Garansi</div>
    <div class="f"><label>Catatan</label><textarea id="fNotes" rows="2" placeholder="Termasuk mobilisasi, material, tenaga kerja..." oninput="render()"></textarea></div>
    <div class="f"><label>Garansi</label>
      <select id="fGuar" onchange="guarChange()">
        <option value="Garansi tertulis 3 bulan mencakup material dan hasil pemasangan.">Garansi 3 bulan (standar)</option>
        <option value="Garansi tertulis 6 bulan mencakup material dan hasil pemasangan.">Garansi 6 bulan</option>
        <option value="">Supply only — tanpa garansi pemasangan</option>
        <option value="__c">Kustom...</option>
      </select>
    </div>
    <div class="f" id="gcWrap" style="display:none">
      <textarea id="fGuarC" rows="2" placeholder="Syarat garansi kustom..." oninput="render()"></textarea>
    </div>
  </div>

  <div class="pay-summary" id="liveSummary"></div>
  <button class="btn-print" onclick="window.print()">&#128424; Cetak / Simpan PDF</button>
</div>

<div class="pp">
  <div class="a4" id="inv"></div>
</div>
</div>

<script>
var items=[],uid=0;
var sMap={
  'PROFORMA':0,'TERMIN1':30,'TERMIN2':40,'TERMIN3':25,'TERMIN4':5,
  'LUNAS':100,'TAGIHAN':100,'CUSTOM':0
};
var sLabel={
  'PROFORMA':'Proforma',
  'TERMIN1':'Termin I · DP 30%',
  'TERMIN2':'Termin II · Progress 40%',
  'TERMIN3':'Termin III · Progress 25%',
  'TERMIN4':'Termin IV · Pelunasan 5%',
  'LUNAS':'Lunas',
  'TAGIHAN':'Tagihan Penuh',
  'CUSTOM':'Tagihan'
};
var sBadge={
  'PROFORMA':'background:#DBEAFE;color:#1E40AF;',
  'TERMIN1':'background:#FEF3C7;color:#92400E;',
  'TERMIN2':'background:#FEF3C7;color:#92400E;',
  'TERMIN3':'background:#FEF3C7;color:#92400E;',
  'TERMIN4':'background:#FEE2E2;color:#991B1B;',
  'LUNAS':'background:#D1FAE5;color:#065F46;',
  'TAGIHAN':'background:#FEF3C7;color:#92400E;',
  'CUSTOM':'background:#FEF3C7;color:#92400E;'
};
var units=['m²','m¹','m³','pcs','unit','Ls','set','kg','ton','zak'];

function idr(n){return'Rp\u00a0'+Math.round(n).toLocaleString('id-ID');}
function fd(d){if(!d)return'—';var p=d.split('-'),M=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];return p[2]+' '+M[+p[1]-1]+' '+p[0];}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function v(id){return(document.getElementById(id)||{value:''}).value;}
function sk(){return v('fStatus').split(':')[0];}
function pct(){return sk()==='CUSTOM'?parseFloat(v('fCPct'))||0:sMap[sk()]||0;}

function genNo(){
  var d=new Date(),y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dy=('0'+d.getDate()).slice(-2);
  var key='inv_counter_'+y+m+dy;
  var count=parseInt(localStorage.getItem(key)||'0')+1;
  localStorage.setItem(key,count);
  document.getElementById('fNo').value='INV-'+y+m+dy+'-'+('00'+count).slice(-3);
  render();
}
function statusChange(){document.getElementById('cPctWrap').style.display=sk()==='CUSTOM'?'':'none';render();}
function guarChange(){document.getElementById('gcWrap').style.display=v('fGuar')==='__c'?'':'none';render();}
function getGuar(){var s=v('fGuar');return s==='__c'?v('fGuarC'):s;}

function addItem(){
  var id=++uid;
  items.push({id:id,desc:'',qty:'',unit:'m²',price:''});
  renderItems();render();
}
function delItem(id){items=items.filter(function(i){return i.id!==id;});renderItems();render();}
function upd(id,f,val){items.forEach(function(i){if(i.id===id)i[f]=val;});render();}

function renderItems(){
  var w=document.getElementById('iWrap');w.innerHTML='';
  items.forEach(function(it){
    var opts=units.map(function(u){return'<option value="'+u+'"'+(it.unit===u?' selected':'')+'>'+u+'</option>';}).join('');
    var d=document.createElement('div');d.className='ir';
    d.innerHTML=
      '<input value="'+eh(it.desc)+'" placeholder="Jasa Pasang Paving Holland K300..." oninput="upd('+it.id+',\'desc\',this.value)">'+
      '<input value="'+eh(it.qty)+'" placeholder="100" oninput="upd('+it.id+',\'qty\',this.value)" style="text-align:right">'+
      '<select onchange="upd('+it.id+',\'unit\',this.value)">'+opts+'</select>'+
      '<input type="number" min="0" value="'+eh(it.price)+'" placeholder="175000" oninput="upd('+it.id+',\'price\',this.value)" style="text-align:right">'+
      '<button class="bd" onclick="delItem('+it.id+')">&times;</button>';
    w.appendChild(d);
  });
}

function calc(){
  var sub=0;
  items.forEach(function(it){sub+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);});
  var disc=parseFloat(v('fDisc'))||0,pp=parseInt(v('fPpn'))||0;
  var ad=sub-disc,ppA=ad*(pp/100),gross=ad+ppA;
  var p=pct(),tag=gross*(p/100),paid=parseFloat(v('fPaid'))||0,sisa=tag-paid;
  return{sub:sub,disc:disc,pp:pp,ppA:ppA,gross:gross,p:p,tag:tag,paid:paid,sisa:sisa};
}

function render(){
  var c=calc(),key=sk(),lbl=sLabel[key]||'',bs=sBadge[key]||sBadge['TAGIHAN'];
  var no=v('fNo')||'INV-2026-001';
  var cn=v('cName')||'—',cp=v('cPhone')||'—',ce=v('cEmail'),ca=v('cAddr')||'—',cpr=v('cProj')||'—';
  var notes=v('fNotes'),guar=getGuar(),next=v('fNext');

  var cleanName=(v('cName')||'Klien').replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'-');
  document.title='INV-'+key+'-'+cleanName;

  document.getElementById('liveSummary').innerHTML=
    '<div class="pay-row"><span>Grand Total</span><span>'+idr(c.gross)+'</span></div>'+
    '<div class="pay-row em"><span>Tagihan ini ('+c.p+'%)</span><span>'+idr(c.tag)+'</span></div>'+
    '<div class="pay-row green"><span>Terbayar</span><span>'+idr(c.paid)+'</span></div>'+
    '<div class="pay-row red"><span>Sisa</span><span>'+idr(Math.max(0,c.sisa))+'</span></div>';

  var trows='';
  items.forEach(function(it){
    var q=parseFloat(it.qty)||0,p=parseFloat(it.price)||0,tot=q*p;
    trows+='<tr><td>'+eh(it.desc||'—')+'</td><td style="text-align:right">'+q.toLocaleString('id-ID')+'</td><td class="td-unit">'+eh(it.unit||'m²')+'</td><td style="text-align:right">'+idr(p)+'</td><td style="text-align:right">'+idr(tot)+'</td></tr>';
  });
  if(!items.length)trows='<tr><td colspan="5" style="text-align:center;color:#6A80A0;padding:10px;font-size:7.5pt;">Belum ada item</td></tr>';
