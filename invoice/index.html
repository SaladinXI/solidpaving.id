---
sitemap: false
---
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — SolidPaving.id</title>
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<style>
:root{
  --blue:#2E3E5F;--blue2:#3D5280;--accent:#95B3D9;
  --bg0:#fff;--bg1:#F4F7FB;--bg2:#EBF1F8;
  --tx1:#0D1A2E;--tx2:#2D4466;--tx3:#4A6080;
  --bdr:rgba(46,62,95,.18);--bds:rgba(13,26,46,.08);
  --green:#0F6E56;--red:#b41e1e;--r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#e8edf3;color:var(--tx1);font-size:14px;}
.app{display:grid;grid-template-columns:400px 1fr;min-height:100vh;}

/* FORM */
.fp{background:var(--bg1);padding:18px;overflow-y:auto;border-right:1px solid var(--bdr);position:sticky;top:0;height:100vh;}
.fp h2{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--accent);}
.sec{margin-bottom:16px;}
.sec-t{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--bds);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.f{margin-bottom:7px;}
label{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:2px;}
input,select,textarea{width:100%;padding:5px 8px;border:1px solid var(--bdr);border-radius:var(--r);font-size:12px;font-family:inherit;color:var(--tx1);background:var(--bg0);outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(149,179,217,.2);}
textarea{resize:vertical;}
.inv-no-row{display:flex;gap:6px;align-items:flex-end;}
.inv-no-row input{flex:1;}
.btn-gen{padding:5px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);font-size:11px;font-weight:600;color:var(--blue2);cursor:pointer;white-space:nowrap;}
.btn-gen:hover{background:var(--accent);color:#fff;}

/* ITEMS */
.ih{display:grid;grid-template-columns:1fr 64px 90px 26px;gap:4px;margin-bottom:3px;}
.ih span{font-size:9px;color:var(--tx3);font-weight:700;}
.ir{display:grid;grid-template-columns:1fr 64px 90px 26px;gap:4px;align-items:start;margin-bottom:4px;}
.ir input{font-size:11px;padding:4px 6px;}
.bd{width:26px;height:28px;background:none;border:1px solid rgba(180,30,30,.25);border-radius:var(--r);color:var(--red);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.bd:hover{background:rgba(180,30,30,.08);}
.ba{background:none;border:1px dashed var(--accent);color:var(--blue2);padding:5px 8px;border-radius:var(--r);cursor:pointer;font-size:11px;font-weight:600;width:100%;margin-top:2px;}
.ba:hover{background:var(--bg2);}

/* PAYMENT SUMMARY BOX */
.pay-summary{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;font-size:12px;}
.pay-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--tx2);}
.pay-row.bold{font-weight:700;color:var(--tx1);border-top:1px solid var(--bdr);margin-top:4px;padding-top:6px;}
.pay-row.red{color:var(--red);}
.pay-row.green{color:var(--green);font-weight:600;}

.btn-print{width:100%;background:var(--blue);color:#fff;border:none;padding:10px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-print:hover{background:var(--blue2);}

/* PREVIEW */
.pp{background:#c8d3e0;padding:24px;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;}

/* A4 INVOICE */
.a4{background:#fff;width:210mm;min-height:297mm;padding:14mm 14mm 12mm;font-family:'Segoe UI',system-ui,sans-serif;font-size:9.5pt;color:#0D1A2E;box-shadow:0 4px 32px rgba(0,0,0,.18);position:relative;}

/* HEADER */
.a4-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8mm;padding-bottom:5mm;border-bottom:2px solid #2E3E5F;}
.logo-block .logo-main{font-size:20pt;font-weight:900;letter-spacing:3px;line-height:1;}
.logo-block .logo-main .s1{color:#2E3E5F;}
.logo-block .logo-main .s2{color:#95B3D9;font-weight:300;}
.logo-block .tagline{font-size:7pt;color:#4A6080;letter-spacing:1.5px;margin-top:2px;}
.logo-block .contact{font-size:7.5pt;color:#4A6080;margin-top:5px;line-height:1.6;}

.inv-info-block{text-align:right;}
.inv-info-block .inv-label{font-size:7pt;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#4A6080;margin-bottom:3px;}
.inv-info-block .inv-number{font-size:16pt;font-weight:900;color:#2E3E5F;letter-spacing:1px;line-height:1.1;}
.status-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:7.5pt;font-weight:700;margin-top:5px;letter-spacing:.5px;}

/* META ROW */
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:6mm;}
.meta-box{background:#F4F7FB;border-radius:4px;padding:6px 10px;}
.meta-box .ml{font-size:7pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4A6080;margin-bottom:2px;}
.meta-box .mv{font-size:9pt;color:#0D1A2E;font-weight:600;}
.meta-box .mv2{font-size:8pt;color:#2D4466;margin-top:1px;}

/* CLIENT */
.client-row{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:6mm;}
.client-box{background:#F4F7FB;border:1px solid rgba(13,26,46,.08);border-radius:4px;padding:8px 10px;}
.box-title{font-size:7pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4A6080;margin-bottom:5px;}
.client-name{font-size:11pt;font-weight:700;color:#0D1A2E;margin-bottom:4px;}
.client-detail{font-size:8pt;color:#2D4466;line-height:1.7;}
.from-box{background:#2E3E5F;border-radius:4px;padding:8px 10px;}
.from-box .box-title{color:rgba(255,255,255,.55);}
.from-box .client-name{color:#fff;font-size:10pt;}
.from-box .client-detail{color:rgba(255,255,255,.75);}

/* TABLE */
table.it{width:100%;border-collapse:collapse;margin-bottom:4mm;font-size:8.5pt;}
table.it thead tr{background:#2E3E5F;}
table.it thead th{color:#fff;padding:6px 8px;font-size:7pt;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
table.it thead th:not(:first-child){text-align:right;}
table.it tbody tr{border-bottom:1px solid rgba(13,26,46,.07);}
table.it tbody tr:nth-child(even){background:#F4F7FB;}
table.it tbody td{padding:6px 8px;}
table.it tbody td:not(:first-child){text-align:right;color:#2D4466;}
table.it tbody td:last-child{font-weight:600;color:#0D1A2E;}
table.it tfoot tr{border-top:1.5px solid #2E3E5F;}
table.it tfoot td{padding:5px 8px;font-size:8.5pt;}

/* PAYMENT BLOCK */
.pay-block{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:5mm;}
.pay-table{font-size:8.5pt;width:100%;}
.pay-table tr td{padding:3px 0;}
.pay-table tr td:last-child{text-align:right;font-weight:600;}
.pay-table .pt-sub td{color:#4A6080;}
.pay-table .pt-disc td{color:#b41e1e;}
.pay-table .pt-ppn td{color:#4A6080;}
.pay-table .pt-gross{border-top:1px solid rgba(13,26,46,.15);}
.pay-table .pt-gross td{font-weight:700;padding-top:6px;}
.pay-table .pt-termin td{color:#2E3E5F;font-weight:700;}
.pay-table .pt-paid td{color:#0F6E56;}
.pay-table .pt-sisa td{color:#b41e1e;font-size:9.5pt;font-weight:700;}

.termin-box{background:#2E3E5F;border-radius:4px;padding:10px 12px;text-align:center;}
.termin-box .tb-label{font-size:7pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:4px;}
.termin-box .tb-pct{font-size:18pt;font-weight:900;color:#95B3D9;line-height:1;}
.termin-box .tb-amount{font-size:10pt;font-weight:700;color:#fff;margin-top:4px;}
.termin-box .tb-status{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:3px;font-size:7pt;font-weight:700;}

.sisa-box{background:#FFF4F4;border:1px solid rgba(180,30,30,.2);border-radius:4px;padding:10px 12px;text-align:center;}
.sisa-box .tb-label{font-size:7pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#b41e1e;opacity:.7;margin-bottom:4px;}
.sisa-box .tb-amount{font-size:13pt;font-weight:900;color:#b41e1e;line-height:1.1;}
.sisa-box.lunas{background:rgba(15,110,86,.07);border-color:rgba(15,110,86,.2);}
.sisa-box.lunas .tb-label{color:#0F6E56;}
.sisa-box.lunas .tb-amount{color:#0F6E56;}

/* NOTES & GUARANTEE */
.note-guar{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:5mm;}
.note-box{background:rgba(149,179,217,.12);border-left:2.5px solid #95B3D9;padding:7px 10px;border-radius:0 4px 4px 0;font-size:8pt;color:#2D4466;line-height:1.6;}
.guar-box{background:rgba(15,110,86,.07);border-left:2.5px solid #0F6E56;padding:7px 10px;border-radius:0 4px 4px 0;font-size:8pt;color:#0F6E56;font-weight:600;line-height:1.6;}
.box-lbl{font-size:7pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;opacity:.65;}

/* BANK & SIG */
.bank-sig{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:5mm;}
.bank-box{background:#F4F7FB;border:1px solid rgba(13,26,46,.08);border-radius:4px;padding:8px 10px;}
.bank-name{font-size:8pt;font-weight:700;color:#2E3E5F;margin-bottom:4px;}
.bank-detail{font-size:8pt;color:#2D4466;line-height:1.6;}
.sig-box{text-align:center;}
.sig-space{height:40px;border-bottom:1px solid rgba(13,26,46,.18);margin-bottom:5px;}
.sig-label{font-size:7.5pt;color:#4A6080;}
.sig-name{font-size:8.5pt;font-weight:700;margin-top:2px;}

/* FOOTER */
.a4-foot{border-top:1px solid rgba(13,26,46,.12);padding-top:4mm;text-align:center;font-size:7.5pt;color:#4A6080;line-height:1.7;}
.a4-foot strong{color:#2E3E5F;}

/* PRINT */
@media print{
  .fp{display:none!important;}
  body{background:#fff;}
  .pp{padding:0;background:#fff;display:block;}
  .a4{box-shadow:none;margin:0;width:100%;}
  @page{size:A4 portrait;margin:0;}
}
@media(max-width:960px){
  .app{grid-template-columns:1fr;}
  .fp{position:static;height:auto;}
  .pp{padding:12px;}
  .a4{width:100%;min-height:auto;padding:8mm;}
}
</style>
</head>
<body>
<div class="app">

<!-- FORM -->
<div class="fp">
  <h2>&#9998;&nbsp; Invoice SolidPaving.id</h2>

  <div class="sec">
    <div class="sec-t">Info Invoice</div>
    <div class="f">
      <label>No. Invoice</label>
      <div class="inv-no-row">
        <input id="fNo" value="INV-2026-001" oninput="render()">
        <button class="btn-gen" onclick="genNo()" title="Generate otomatis">&#8635; Auto</button>
      </div>
    </div>
    <div class="f">
      <label>Status Pembayaran</label>
      <select id="fStatus" onchange="statusChange()">
        <option value="PROFORMA:0">Proforma (tanpa tagihan)</option>
        <option value="TERMIN1:30">Termin 1 — 30%</option>
        <option value="TERMIN2:50">Termin 2 — 50%</option>
        <option value="PELUNASAN:20">Pelunasan — 20%</option>
        <option value="DP:50">DP — 50%</option>
        <option value="LUNAS:100">Lunas — 100%</option>
        <option value="TAGIHAN:100">Tagihan Penuh</option>
        <option value="CUSTOM:0">Persentase Kustom...</option>
      </select>
    </div>
    <div class="f" id="customPctWrap" style="display:none">
      <label>Persentase Tagihan (%)</label>
      <input id="fCustomPct" type="number" min="1" max="100" value="30" oninput="render()">
    </div>
    <div class="r2">
      <div class="f"><label>Tgl. Invoice</label><input id="fDate" type="date" oninput="render()"></div>
      <div class="f"><label>Jatuh Tempo</label><input id="fDue" type="date" oninput="render()"></div>
    </div>
    <div class="f"><label>Tgl. Penagihan Berikutnya (opsional)</label><input id="fNext" type="date" oninput="render()"></div>
  </div>

  <div class="sec">
    <div class="sec-t">Data Klien</div>
    <div class="f"><label>Nama / Perusahaan</label><input id="cName" placeholder="PT. Contoh / Bpk. Ahmad" oninput="render()"></div>
    <div class="r2">
      <div class="f"><label>No. Telepon / WA</label><input id="cPhone" placeholder="0812-xxxx-xxxx" oninput="render()"></div>
      <div class="f"><label>Email (opsional)</label><input id="cEmail" placeholder="email@..." oninput="render()"></div>
    </div>
    <div class="f"><label>Alamat Klien</label><textarea id="cAddr" rows="2" placeholder="Jl. ..." oninput="render()"></textarea></div>
    <div class="f"><label>Lokasi / Alamat Proyek</label><textarea id="cProj" rows="2" placeholder="Lokasi pemasangan..." oninput="render()"></textarea></div>
  </div>

  <div class="sec">
    <div class="sec-t">Item &amp; Layanan</div>
    <div class="ih"><span>Deskripsi</span><span>Qty/Vol</span><span>Harga/Sat (Rp)</span><span></span></div>
    <div id="iWrap"></div>
    <button class="ba" onclick="addItem()">+ Tambah Item</button>
  </div>

  <div class="sec">
    <div class="sec-t">Diskon &amp; Pajak</div>
    <div class="r2">
      <div class="f"><label>Diskon (Rp)</label><input id="fDisc" type="number" min="0" value="0" oninput="render()"></div>
      <div class="f"><label>PPN</label>
        <select id="fPpn" onchange="render()">
          <option value="0">Tanpa PPN</option>
          <option value="11">PPN 11%</option>
          <option value="12">PPN 12%</option>
        </select>
      </div>
    </div>
    <div class="f"><label>Sudah Terbayar (Rp)</label><input id="fPaid" type="number" min="0" value="0" oninput="render()"></div>
  </div>

  <div class="sec">
    <div class="sec-t">Catatan &amp; Garansi</div>
    <div class="f"><label>Catatan</label><textarea id="fNotes" rows="2" placeholder="Termasuk mobilisasi, material, tenaga kerja..." oninput="render()"></textarea></div>
    <div class="f"><label>Garansi</label>
      <select id="fGuar" onchange="guarChange()">
        <option value="Garansi tertulis 3 bulan mencakup material dan hasil pemasangan.">Garansi 3 bulan (standar)</option>
        <option value="Garansi tertulis 6 bulan mencakup material dan hasil pemasangan.">Garansi 6 bulan</option>
        <option value="">Supply only — tanpa garansi pemasangan</option>
        <option value="__c">Kustom...</option>
      </select>
    </div>
    <div class="f" id="gcWrap" style="display:none">
      <textarea id="fGuarC" rows="2" placeholder="Syarat garansi kustom..." oninput="render()"></textarea>
    </div>
  </div>

  <!-- LIVE SUMMARY -->
  <div class="pay-summary" id="liveSummary"></div>

  <button class="btn-print" onclick="window.print()">&#128424;&nbsp; Cetak / Simpan PDF</button>
</div>

<!-- PREVIEW -->
<div class="pp">
  <div class="a4" id="inv"></div>
</div>
</div>

<script>
var items=[], uid=0;

var statusMap={
  'PROFORMA':0,'TERMIN1':30,'TERMIN2':50,'PELUNASAN':20,
  'DP':50,'LUNAS':100,'TAGIHAN':100,'CUSTOM':0
};
var statusLabel={
  'PROFORMA':'PROFORMA','TERMIN1':'TERMIN 1 · 30%','TERMIN2':'TERMIN 2 · 50%',
  'PELUNASAN':'PELUNASAN · 20%','DP':'DOWN PAYMENT · 50%',
  'LUNAS':'LUNAS','TAGIHAN':'TAGIHAN PENUH','CUSTOM':'TAGIHAN'
};
var badgeStyle={
  'PROFORMA':'background:#EBF1F8;color:#2E3E5F;',
  'TERMIN1':'background:#FAEEDA;color:#854F0B;',
  'TERMIN2':'background:#FAEEDA;color:#854F0B;',
  'PELUNASAN':'background:#FFF4F4;color:#b41e1e;',
  'DP':'background:#EBF1F8;color:#2E3E5F;',
  'LUNAS':'background:rgba(15,110,86,.18);color:#0F6E56;',
  'TAGIHAN':'background:#FAEEDA;color:#854F0B;',
  'CUSTOM':'background:#FAEEDA;color:#854F0B;'
};

function idr(n){return'Rp\u00a0'+Math.round(n).toLocaleString('id-ID');}
function fd(d){if(!d)return'—';var p=d.split('-'),M=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];return p[2]+' '+M[+p[1]-1]+' '+p[0];}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function v(id){return(document.getElementById(id)||{value:''}).value;}

function genNo(){
  var d=new Date();
  var y=d.getFullYear();
  var m=('0'+(d.getMonth()+1)).slice(-2);
  var r=Math.floor(Math.random()*900)+100;
  document.getElementById('fNo').value='INV-'+y+m+'-'+r;
  render();
}

function statusChange(){
  var raw=v('fStatus').split(':')[0];
  document.getElementById('customPctWrap').style.display=raw==='CUSTOM'?'':'none';
  render();
}
function guarChange(){
  document.getElementById('gcWrap').style.display=v('fGuar')==='__c'?'':'none';
  render();
}
function getGuar(){
  var s=v('fGuar');
  if(s==='__c')return v('fGuarC');
  return s;
}
function getPct(){
  var raw=v('fStatus').split(':')[0];
  if(raw==='CUSTOM')return parseFloat(v('fCustomPct'))||0;
  return statusMap[raw]||0;
}
function getStatusKey(){return v('fStatus').split(':')[0];}

function addItem(){
  var id=++uid;
  items.push({id:id,desc:'',qty:'',price:''});
  renderItems();render();
}
function delItem(id){items=items.filter(function(i){return i.id!==id;});renderItems();render();}
function upd(id,f,val){items.forEach(function(i){if(i.id===id)i[f]=val;});render();}

function renderItems(){
  var w=document.getElementById('iWrap');w.innerHTML='';
  items.forEach(function(it){
    var d=document.createElement('div');d.className='ir';
    d.innerHTML=
      '<input value="'+eh(it.desc)+'" placeholder="Jasa Pasang Paving Holland K300..." oninput="upd('+it.id+',\'desc\',this.value)">'+
      '<input value="'+eh(it.qty)+'" placeholder="100 m²" oninput="upd('+it.id+',\'qty\',this.value)" style="text-align:right">'+
      '<input type="number" min="0" value="'+eh(it.price)+'" placeholder="175000" oninput="upd('+it.id+',\'price\',this.value)" style="text-align:right">'+
      '<button class="bd" onclick="delItem('+it.id+')">&times;</button>';
    w.appendChild(d);
  });
}

function calcAll(){
  var sub=0;
  items.forEach(function(it){sub+=(parseFloat(it.qty)||0)*(parseFloat(it.price)||0);});
  var disc=parseFloat(v('fDisc'))||0;
  var ppnPct=parseInt(v('fPpn'))||0;
  var afterDisc=sub-disc;
  var ppnAmt=afterDisc*(ppnPct/100);
  var gross=afterDisc+ppnAmt;
  var pct=getPct();
  var tagihan=gross*(pct/100);
  var paid=parseFloat(v('fPaid'))||0;
  var sisa=tagihan-paid;
  return{sub:sub,disc:disc,ppnPct:ppnPct,ppnAmt:ppnAmt,afterDisc:afterDisc,gross:gross,pct:pct,tagihan:tagihan,paid:paid,sisa:sisa};
}

function render(){
  var c=calcAll();
  var sk=getStatusKey();
  var sl=statusLabel[sk]||'TAGIHAN';
  var bs=badgeStyle[sk]||badgeStyle['TAGIHAN'];
  var no=v('fNo')||'INV-2026-001';
  var date=v('fDate'),due=v('fDue'),next=v('fNext');
  var cn=v('cName')||'—',cp=v('cPhone')||'—',ce=v('cEmail'),ca=v('cAddr')||'—',cpr=v('cProj')||'—';
  var notes=v('fNotes'),guar=getGuar();

  /* live summary */
  document.getElementById('liveSummary').innerHTML=
    '<div class="pay-row"><span>Grand Total</span><span>'+idr(c.gross)+'</span></div>'+
    '<div class="pay-row bold"><span>Tagihan Ini ('+c.pct+'%)</span><span>'+idr(c.tagihan)+'</span></div>'+
    '<div class="pay-row green"><span>Sudah Terbayar</span><span>'+idr(c.paid)+'</span></div>'+
    '<div class="pay-row red bold"><span>Sisa Tagihan</span><span>'+idr(Math.max(0,c.sisa))+'</span></div>';

  /* item rows */
  var trows='';
  items.forEach(function(it){
    var q=parseFloat(it.qty)||0,p=parseFloat(it.price)||0,tot=q*p;
    trows+='<tr><td>'+eh(it.desc||'—')+'</td><td>'+q.toLocaleString('id-ID')+'</td><td>'+idr(p)+'</td><td>'+idr(tot)+'</td></tr>';
  });
