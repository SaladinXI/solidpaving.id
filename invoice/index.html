---
sitemap: false
---
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — SolidPaving.id</title>
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<style>
:root{
  --blue:#2E3E5F;--blue2:#3D5280;--accent:#95B3D9;
  --bg0:#fff;--bg1:#F4F7FB;--bg2:#EBF1F8;
  --tx1:#0D1A2E;--tx2:#2D4466;--tx3:#4A6080;
  --bdr:rgba(46,62,95,.18);--bds:rgba(13,26,46,.08);
  --green:#0F6E56;--r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:var(--tx1);font-size:14px;}
.app{display:grid;grid-template-columns:420px 1fr;min-height:100vh;}

.form-panel{background:var(--bg1);padding:20px;overflow-y:auto;border-right:1px solid var(--bdr);}
.form-panel h2{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--accent);}
.section{margin-bottom:18px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bds);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field{margin-bottom:8px;}
label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:3px;}
input,select,textarea{width:100%;padding:6px 9px;border:1px solid var(--bdr);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--tx1);background:var(--bg0);outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(149,179,217,.2);}
textarea{resize:vertical;}

.item-header{display:grid;grid-template-columns:1fr 70px 100px 28px;gap:5px;margin-bottom:4px;}
.item-header span{font-size:10px;color:var(--tx3);font-weight:700;}
.item-row{display:grid;grid-template-columns:1fr 70px 100px 28px;gap:5px;align-items:start;margin-bottom:5px;}
.item-row input{font-size:12px;padding:5px 7px;}
.btn-del{width:28px;height:30px;background:none;border:1px solid rgba(180,30,30,.25);border-radius:var(--r);color:#b41e1e;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
.btn-del:hover{background:rgba(180,30,30,.08);}
.btn-add{background:none;border:1px dashed var(--accent);color:var(--blue2);padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;width:100%;margin-top:3px;transition:background .15s;}
.btn-add:hover{background:var(--bg2);}
.btn-print{width:100%;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s;}
.btn-print:hover{background:var(--blue2);}

.preview-panel{background:#dde5ef;padding:20px;overflow-y:auto;}
.inv-wrap{background:#fff;max-width:680px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.14);}

.inv-header{background:var(--blue);color:#fff;padding:26px 30px 20px;}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.inv-logo-text .solid{font-size:22px;font-weight:900;letter-spacing:3px;color:#fff;}
.inv-logo-text .paving{font-size:22px;font-weight:300;letter-spacing:3px;color:var(--accent);}
.inv-logo-text .tagline{font-size:10px;opacity:.55;letter-spacing:1px;margin-top:3px;}
.inv-badge-title{text-align:right;}
.inv-badge{display:inline-block;padding:3px 12px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:8px;}
.inv-title-text{font-size:24px;font-weight:900;letter-spacing:2px;opacity:.9;}
.inv-num{font-size:11px;opacity:.55;margin-top:1px;}
.inv-dates{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.inv-dates .dl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.55;margin-bottom:2px;}
.inv-dates .dv{font-size:13px;opacity:.88;}

.inv-body{padding:22px 30px;}
.inv-sec{margin-bottom:18px;}
.inv-sec-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;}
.client-box{background:var(--bg1);border:1px solid var(--bds);border-radius:var(--r);padding:12px 14px;}
.client-name{font-size:15px;font-weight:700;color:var(--tx1);margin-bottom:7px;}
.client-grid{display:grid;grid-template-columns:90px 1fr;gap:3px 8px;font-size:12px;}
.client-grid .lbl{color:var(--tx3);}
.client-grid .val{color:var(--tx1);}

table.inv-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.inv-table thead tr{background:var(--blue);}
table.inv-table thead th{color:#fff;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
table.inv-table thead th:not(:first-child){text-align:right;}
table.inv-table tbody tr{border-bottom:1px solid var(--bds);}
table.inv-table tbody tr:nth-child(even){background:var(--bg1);}
table.inv-table tbody td{padding:8px 10px;color:var(--tx1);}
table.inv-table tbody td:not(:first-child){text-align:right;color:var(--tx2);}
table.inv-table tbody td:last-child{font-weight:600;color:var(--tx1);}
table.inv-table tfoot td{padding:6px 10px;font-size:12px;}
.row-sub td{color:var(--tx2)!important;font-size:12px;}
.row-ppn td{color:var(--tx2)!important;font-size:12px;}
.row-total{background:var(--blue)!important;}
.row-total td{color:#fff!important;font-weight:700!important;font-size:14px!important;padding:10px!important;}

.note-box{background:rgba(149,179,217,.13);border-left:3px solid var(--accent);padding:9px 12px;border-radius:0 var(--r) var(--r) 0;margin-bottom:14px;}
.note-box p{font-size:12px;color:var(--tx2);line-height:1.6;}
.guar-box{background:rgba(15,110,86,.07);border-left:3px solid var(--green);padding:9px 12px;border-radius:0 var(--r) var(--r) 0;margin-bottom:14px;}
.guar-box p{font-size:12px;color:var(--green);font-weight:600;}

.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.bank-box{background:var(--bg1);border:1px solid var(--bds);border-radius:var(--r);padding:10px 13px;}
.bank-box .bn{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:5px;}
.bank-box .bd{font-size:12px;color:var(--tx2);line-height:1.6;}

.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:8px;}
.sig-item{text-align:center;}
.sig-space{height:48px;border-bottom:1px solid var(--bdr);margin-bottom:6px;}
.sig-item .sn{font-size:11px;color:var(--tx3);}
.sig-item .sp{font-weight:600;font-size:13px;margin-top:2px;}

.inv-footer{background:var(--blue);color:rgba(255,255,255,.65);text-align:center;padding:12px;font-size:11px;line-height:1.7;}
.inv-footer strong{color:#fff;}

@media print{
  .form-panel{display:none!important;}
  .preview-panel{padding:0;background:#fff;}
  .inv-wrap{box-shadow:none;border-radius:0;max-width:100%;}
  .app{display:block;}
  body{background:#fff;}
}
@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .preview-panel{padding:12px;}
}
</style>
</head>
<body>
<div class="app">

<div class="form-panel">
  <h2>&#9998;&nbsp; Invoice SolidPaving.id</h2>

  <div class="section">
    <div class="section-title">Info Invoice</div>
    <div class="row2">
      <div class="field"><label>No. Invoice</label><input id="fNo" value="INV-2026-001" oninput="render()"></div>
      <div class="field"><label>Status</label>
        <select id="fStatus" onchange="render()">
          <option value="PROFORMA">Proforma</option>
          <option value="TAGIHAN">Tagihan</option>
          <option value="DP 50%">DP 50%</option>
          <option value="LUNAS">Lunas</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Tanggal Invoice</label><input id="fDate" type="date" oninput="render()"></div>
      <div class="field"><label>Jatuh Tempo</label><input id="fDue" type="date" oninput="render()"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Data Klien</div>
    <div class="field"><label>Nama / Perusahaan</label><input id="cName" placeholder="PT. Contoh / Bpk. Ahmad" oninput="render()"></div>
    <div class="row2">
      <div class="field"><label>No. Telepon / WA</label><input id="cPhone" placeholder="0812-xxxx-xxxx" oninput="render()"></div>
      <div class="field"><label>Email (opsional)</label><input id="cEmail" placeholder="email@..." oninput="render()"></div>
    </div>
    <div class="field"><label>Alamat Klien</label><textarea id="cAddr" rows="2" placeholder="Jl. ..." oninput="render()"></textarea></div>
    <div class="field"><label>Lokasi / Alamat Proyek</label><textarea id="cProj" rows="2" placeholder="Lokasi pemasangan..." oninput="render()"></textarea></div>
  </div>

  <div class="section">
    <div class="section-title">Item &amp; Layanan</div>
    <div class="item-header">
      <span>Deskripsi</span><span>Qty/Vol</span><span>Harga/Sat (Rp)</span><span></span>
    </div>
    <div id="itemsWrap"></div>
    <button class="btn-add" onclick="addItem()">+ Tambah Item</button>
  </div>

  <div class="section">
    <div class="section-title">Diskon &amp; Pajak</div>
    <div class="row2">
      <div class="field"><label>Diskon (Rp)</label><input id="fDisc" type="number" min="0" value="0" oninput="render()"></div>
      <div class="field"><label>PPN</label>
        <select id="fPpn" onchange="render()">
          <option value="0">Tanpa PPN</option>
          <option value="11">PPN 11%</option>
          <option value="12">PPN 12%</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Catatan &amp; Garansi</div>
    <div class="field"><label>Catatan</label><textarea id="fNotes" rows="3" placeholder="Termasuk biaya mobilisasi, material, tenaga kerja..." oninput="render()"></textarea></div>
    <div class="field"><label>Garansi</label>
      <select id="fGuar" onchange="guarChange()">
        <option value="Garansi tertulis 3 bulan mencakup material dan hasil pemasangan.">Garansi 3 bulan (standar)</option>
        <option value="Garansi tertulis 6 bulan mencakup material dan hasil pemasangan.">Garansi 6 bulan</option>
        <option value="">Supply only — tanpa garansi pemasangan</option>
        <option value="__custom">Kustom...</option>
      </select>
    </div>
    <div id="guarCustomWrap" style="display:none" class="field">
      <textarea id="fGuarCustom" rows="2" placeholder="Tulis syarat garansi..." oninput="render()"></textarea>
    </div>
  </div>

  <button class="btn-print" onclick="window.print()">&#128424;&nbsp; Cetak / Simpan PDF</button>
</div>

<div class="preview-panel">
  <div class="inv-wrap" id="inv"></div>
</div>
</div>

<script>
var items=[], uid=0;
var badgeStyles={
  'PROFORMA':'background:#EBF1F8;color:#2E3E5F;',
  'TAGIHAN':'background:#FAEEDA;color:#854F0B;',
  'DP 50%':'background:#EBF1F8;color:#2E3E5F;',
  'LUNAS':'background:rgba(15,110,86,.18);color:#0F6E56;'
};
function idr(n){return'Rp\u00a0'+Math.round(n).toLocaleString('id-ID');}
function fd(d){if(!d)return'—';var p=d.split('-'),M=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];return p[2]+' '+M[+p[1]-1]+' '+p[0];}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function v(id){return document.getElementById(id).value;}

function addItem(){
  var id=++uid;
  items.push({id:id,desc:'',qty:'',price:''});
  renderItems();render();
}
function delItem(id){items=items.filter(function(i){return i.id!==id;});renderItems();render();}
function upd(id,f,val){items.forEach(function(i){if(i.id===id)i[f]=val;});render();}

function renderItems(){
  var w=document.getElementById('itemsWrap');w.innerHTML='';
  items.forEach(function(it){
    var d=document.createElement('div');d.className='item-row';
    d.innerHTML=
      '<input value="'+eh(it.desc)+'" placeholder="Jasa Pasang / Paving Holland K300..." oninput="upd('+it.id+',\'desc\',this.value)">'+
      '<input value="'+eh(it.qty)+'" placeholder="100 m²" oninput="upd('+it.id+',\'qty\',this.value)" style="text-align:right">'+
      '<input type="number" min="0" value="'+eh(it.price)+'" placeholder="175000" oninput="upd('+it.id+',\'price\',this.value)" style="text-align:right">'+
      '<button class="btn-del" onclick="delItem('+it.id+')" title="Hapus">&times;</button>';
    w.appendChild(d);
  });
}

function guarChange(){
  var s=document.getElementById('fGuar').value;
  document.getElementById('guarCustomWrap').style.display=s==='__custom'?'':'none';
  render();
}
function getGuar(){
  var s=document.getElementById('fGuar').value;
  if(s==='__custom')return v('fGuarCustom');
  return s;
}

function render(){
  var no=v('fNo')||'INV-2026-001';
  var status=v('fStatus');
  var date=v('fDate'),due=v('fDue');
  var cn=v('cName')||'—',cp=v('cPhone')||'—';
  var ce=v('cEmail'),ca=v('cAddr')||'—',cpr=v('cProj')||'—';
  var disc=parseFloat(v('fDisc'))||0;
  var ppnPct=parseInt(v('fPpn'))||0;
  var notes=v('fNotes'),guar=getGuar();

  var sub=0,trows='';
  items.forEach(function(it){
    var q=parseFloat(it.qty)||0,p=parseFloat(it.price)||0,tot=q*p;
    sub+=tot;
    trows+='<tr><td>'+eh(it.desc||'—')+'</td><td>'+q.toLocaleString('id-ID')+'</td><td>'+idr(p)+'</td><td>'+idr(tot)+'</td></tr>';
  });
  if(!items.length)trows='<tr><td colspan="4" style="text-align:center;color:var(--tx3);padding:16px;font-size:12px;">Belum ada item</td></tr>';

  var afterDisc=sub-disc;
  var ppnAmt=afterDisc*(ppnPct/100);
  var grand=afterDisc+ppnAmt;

  var discRow=disc>0?'<tr class="row-sub"><td colspan="3" style="text-align:right">Diskon</td><td style="text-align:right;color:#b41e1e">- '+idr(disc)+'</td></tr>':'';
  var ppnRow=ppnPct?'<tr class="row-ppn"><td colspan="3" style="text-align:right">PPN '+ppnPct+'%</td><td style="text-align:right">'+idr(ppnAmt)+'</td></tr>':'';
  var bs=badgeStyles[status]||badgeStyles['TAGIHAN'];

  document.getElementById('inv').innerHTML=
  '<div class="inv-header">'+
    '<div class="inv-top">'+
      '<div class="inv-logo-text">'+
        '<div><span class="solid">SOLID</span><span class="paving">PAVING</span></div>'+
        '<div class="tagline">Tidak Amblas · Bergaransi</div>'+
      '</div>'+
      '<div class="inv-badge-title">'+
        '<div><span class="inv-badge" style="'+bs+'">'+status+'</span></div>'+
        '<div class="inv-title-text">INVOICE</div>'+
        '<div class="inv-num"># '+eh(no)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="inv-dates">'+
      '<div><div class="dl">Tanggal Invoice</div><div class="dv">'+fd(date)+'</div></div>'+
      '<div><div class="dl">Jatuh Tempo</div><div class="dv">'+fd(due)+'</div></div>'+
    '</div>'+
  '</div>'+
  '<div class="inv-body">'+
    '<div class="inv-sec">'+
      '<div class="inv-sec-title">Ditagihkan Kepada</div>'+
      '<div class="client-box">'+
        '<div class="client-name">'+eh(cn)+'</div>'+
        '<div class="client-grid">'+
          '<span class="lbl">Telepon</span><span class="val">'+eh(cp)+'</span>'+
          (ce?'<span class="lbl">Email</span><span class="val">'+eh(ce)+'</span>':'')+
          '<span class="lbl">Alamat</span><span class="val">'+eh(ca)+'</span>'+
          '<span class="lbl">Lokasi Proyek</span><span class="val">'+eh(cpr)+'</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="inv-sec">'+
      '<div class="inv-sec-title">Rincian Pekerjaan</div>'+
      '<table class="inv-table">'+
        '<thead><tr><th>Deskripsi</th><th style="text-align:right">Qty / Vol</th><th style="text-align:right">Harga Satuan</th><th style="text-align:right">Total</th></tr></thead>'+
        '<tbody>'+trows+'</tbody>'+
        '<tfoot>'+
          '<tr class="row-sub"><td colspan="3" style="text-align:right">Subtotal</td><td style="text-align:right;font-weight:600">'+idr(sub)+'</td></tr>'+
          discRow+ppnRow+
          '<tr class="row-total"><td colspan="3">TOTAL</td><td style="text-align:right">'+idr(grand)+'</td></tr>'+
        '</tfoot>'+
      '</table>'+
    '</div>'+
    (notes?'<div class="note-box"><p>'+eh(notes)+'</p></div>':'')+
    (guar?'<div class="guar-box"><p>&#10003;&nbsp;'+eh(guar)+'</p></div>':'')+
    '<div class="inv-sec">'+
      '<div class="inv-sec-title">Informasi Pembayaran</div>'+
      '<div class="bank-grid">'+
        '<div class="bank-box"><div class="bn">BCA — Cab. Cibubur Arundina</div><div class="bd">No. Rek: <strong>628-184-6962</strong><br>A.n: Muh Nafis Arifuddin</div></div>'+
        '<div class="bank-box"><div class="bn">Konfirmasi Pembayaran</div><div class="bd">WhatsApp: <strong>0859-4349-2832</strong><br>sales@solidpaving.id</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="sig-grid">'+
      '<div class="sig-item"><div class="sig-space"></div><div class="sn">Klien / Pemesan</div><div class="sp">'+eh(cn)+'</div></div>'+
      '<div class="sig-item"><div class="sig-space"></div><div class="sn">SolidPaving.id</div><div class="sp">Muh Nafis Arifuddin</div></div>'+
    '</div>'+
  '</div>'+
  '<div class="inv-footer">'+
    '<strong>SolidPaving.id</strong> &nbsp;·&nbsp; 0859-4349-2832 &nbsp;·&nbsp; sales@solidpaving.id &nbsp;·&nbsp; solidpaving.id'+
  '</div>';
}

function guarChange(){
  document.getElementById('guarCustomWrap').style.display=document.getElementById('fGuar').value==='__custom'?'':'none';
  render();
}

(function(){
  var t=new Date(),d=new Date(t);d.setDate(d.getDate()+7);
  function p(x){return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);}
  document.getElementById('fDate').value=p(t);
  document.getElementById('fDue').value=p(d);
  addItem();addItem();
})();
</script>
</body>
</html>
